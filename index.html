<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Fichas Matemáticas para Primaria</title>
    <style>
        /* ==========================================
           ESTILOS GENERALES DE LA APLICACIÓN
           ========================================== */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* Panel de Configuración Lateral izquierdo */
        .sidebar {
            width: 380px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        h2 { border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; font-size: 1.4rem; margin: 0; color: #0f172a; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        select, input[type="number"], input[type="file"] {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
            outline: none;
            width: 100%;
        }

        select:focus, input:focus { border-color: var(--primary); }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }
        .btn-generate { background-color: var(--primary); color: white; }
        .btn-generate:hover { background-color: var(--primary-hover); }
        .btn-pdf { background-color: #10b981; color: white; margin-top: 10px; }
        .btn-pdf:hover { background-color: #059669; }

        /* Contenedor Vista Previa Derecho */
        .preview-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; /* Separación visual entre hojas en pantalla */
        }

        /* ==========================================
           ESTILOS MAQUETA INDEPENDIENTE (A4 POR PÁGINA)
           Garantiza consistencia absoluta de márgenes superiores e inferiores
           ========================================== */
        .a4-page {
            width: 210mm;
            height: 297mm; /* Fijamos la altura estricta de un folio */
            background-color: #ffffff;
            padding: 20mm 15mm; /* Márgenes simétricos repetidos por hoja */
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Imagen de cabecera arriba del todo con altura máxima de 1cm */
        .ficha-header-image {
            width: 100%;
            height: 1cm;
            object-fit: contain;
            object-position: left center;
            margin-bottom: 15px;
            display: none;
        }

        /* Datos de alumno */
        .ficha-header-fields {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
        }

        /* Listado interno de problemas */
        .problems-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            flex-grow: 1; /* Permite ocupar el espacio disponible */
        }

        .problem-block {
            margin-bottom: 5px;
            width: 100%;
        }

        .problem-text {
            font-size: 1.15rem;
            line-height: 1.5;
            margin: 0 0 8px 0;
            color: #000;
            text-align: justify;
        }

        .response-box {
            width: 100%;
            height: 3.4cm; /* Altura exacta solicitada */
            border: 2px dashed #718096;
            border-radius: 4px;
            background-color: #fafafa;
        }

        /* PIE DE PÁGINA DE AUTORÍA */
        .ficha-footer {
            position: absolute;
            bottom: 15mm; /* Ubicado exactamente dentro del margen inferior */
            left: 15mm;
            right: 15mm;
            border-top: 1px solid #cbd5e1;
            padding-top: 8px;
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }

        /* ==========================================
           CONFIGURACIÓN CRÍTICA PARA IMPRESIÓN / PDF
           ========================================== */
        @page {
            size: A4 portrait;
            margin: 0; /* Desactivamos los márgenes por defecto del navegador */
        }

        @media print {
            body, html {
                background: #ffffff !important;
                height: auto;
                overflow: visible;
            }
            .sidebar {
                display: none !important;
            }
            .preview-container {
                padding: 0 !important;
                margin: 0 !important;
                background: none !important;
                overflow: visible !important;
                display: block !important;
            }
            .a4-page {
                box-shadow: none !important;
                width: 210mm !important;
                height: 297mm !important; /* Fuerza a cada div a ser una hoja física */
                padding: 20mm 15mm !important;
                margin: 0 !important;
                page-break-after: always; /* Rompe la página al finalizar este div */
                break-after: page;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Fichas de Matemáticas</h2>
        <p style="font-size:0.85rem; color:#64748b; margin:0;">Diseñado para docentes de 1º y 2º de Educación Primaria.</p>
        
        <div class="form-group">
            <label for="imageUpload">Imagen de cabecera (Opcional)</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="form-group">
            <label for="opType">Tipo de operaciones</label>
            <select id="opType">
                <option value="suma_sin">Suma sin llevar</option>
                <option value="resta_sin">Resta sin llevar</option>
                <option value="suma_resta_sin">Sumar y restar sin llevar</option>
                <option value="suma_llev_resta_sin">Suma llevando y resta sin llevar</option>
                <option value="suma_resta_llev">Suma y resta llevando</option>
                <option value="multiplicar">Multiplicar</option>
                <option value="mix_todo">Suma y resta llevando y multiplicaciones</option>
            </select>
        </div>

        <div class="form-group">
            <label for="probCount">Número de problemas (1-50)</label>
            <input type="number" id="probCount" min="1" max="50" value="6">
        </div>

        <button class="btn btn-generate" id="btnGenerate">✨ Generar ficha</button>
        <button class="btn btn-pdf" id="btnDownload">💾 Descargar PDF / Imprimir</button>
    </div>

    <div class="preview-container" id="previewContainer">
        </div>

    <script>
        /* Banco de vocabulario adaptado */
        const nombres = ["Ana", "Pablo", "Sofía", "Lucas", "Carla", "Diego", "Marta", "Leo", "Julia", "Hugo", "Elena", "Mario", "Laura", "Sara", "David", "Noa"];
        const objetos = [
            { nombre: "cromos", genero: "m" }, { nombre: "pegatinas", genero: "f" },
            { nombre: "lápices", genero: "m" }, { nombre: "gomas", genero: "f" },
            { nombre: "cuentos", genero: "m" }, { nombre: "caramelos", genero: "m" },
            { nombre: "canicas", genero: "f" }, { nombre: "flores", genero: "f" },
            { nombre: "globos", genero: "m" }, { nombre: "bloques", genero: "m" },
            { nombre: "juguetes", genero: "m" }, { nombre: "fichas", genero: "f" },
            { nombre: "pinturas", genero: "f" }, { nombre: "monedas", genero: "f" },
            { nombre: "libros", genero: "m" }
        ];
        const lugares = ["colegio", "parque", "biblioteca", "casa", "patio", "granja", "excursión", "clase", "tienda", "jardín"];
        const contextos = ["cumpleaños", "excursión", "recreo", "fiesta", "merienda", "juego", "concurso", "paseo", "taller"];

        const plantillas = {
            suma: [
                "En el [lugar], [Nombre] tiene [A] [objeto] y compra [B] [objeto] más para su fiesta de [contexto]. ¿[Cuantos] [objeto] tiene en total?",
                "Durante el [contexto] en el [lugar], [Nombre] guardó [A] [objeto]. Su amigo le regaló [B] [objeto] más. ¿[Cuantos] [objeto] tiene ahora?",
                "[Nombre] reunió [A] [objeto] en su [lugar]. Para el juego de [contexto], su profesora le dio [B] [objeto] adicionales. ¿[Cuantos] [objeto] tiene al final?"
            ],
            resta: [
                "[Nombre] tenía [A] [objeto] en su [lugar] para el [contexto]. Si le regaló [B] [objeto] a un compañero, ¿[cuantos] [objeto] le quedan?",
                "En la clase del [lugar], había [A] [objeto] preparados para el [contexto]. [Nombre] usó [B] [objeto]. ¿[Cuantos] [objeto] quedan listos?",
                "Para un juego de [contexto] en el [lugar], [Nombre] trajo [A] [objeto], pero se le perdieron [B] [objeto]. ¿[Cuantos] [objeto] tiene ahora?"
            ],
            multiplicar: [
                "En el [lugar], [Nombre] organiza una merienda de [contexto] and prepara [A] bolsas con [B] [objeto] cada una. ¿[Cuantos] [objeto] colocó en total?",
                "Para el taller de [contexto] en el [lugar], [Nombre] compra [A] cajas llenas de [objeto]. Si cada caja tiene [B] [objeto], ¿[cuantos] tiene en total?",
                "[Nombre] organiza sus estanterías en la [lugar]. Si coloca [A] filas con [B] [objeto] en cada una, ¿[cuantos] [objeto] guardó en total?"
            ]
        };

        let base64Image = "";

        /* Manejo de carga de imagen */
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64Image = event.target.result;
                    // Forzamos un regenerado para que la imagen aparezca correctamente calculada
                    generarFicha();
                };
                reader.readAsDataURL(file);
            }
        });

        /* Algoritmia Numérica Coherente */
        function generarNumerosSumaSinLlevar() {
            while(true) {
                let u1 = Math.floor(Math.random() * 8) + 1;
                let u2 = Math.floor(Math.random() * (10 - u1));
                let d1 = Math.floor(Math.random() * 8) + 1;
                let d2 = Math.floor(Math.random() * (10 - d1));
                let num1 = d1 * 10 + u1; let num2 = d2 * 10 + u2;
                if(num1 + num2 < 100 && num2 > 0) return [num1, num2];
            }
        }

        function generarNumerosRestaSinLlevar() {
            while(true) {
                let num1 = Math.floor(Math.random() * 80) + 15;
                let d1 = Math.floor(num1 / 10); let u1 = num1 % 10;
                let d2 = Math.floor(Math.random() * d1); let u2 = Math.floor(Math.random() * (u1 + 1));
                let num2 = d2 * 10 + u2;
                if (num2 > 0 && num1 !== num2) return [num1, num2];
            }
        }

        // Corregido bug ortográfico en el nombre original de la función que venía en tu código para mantener consistencia
        function generarNumerosSumaLleando() {
            while(true) {
                let num1 = Math.floor(Math.random() * 70) + 10;
                let num2 = Math.floor(Math.random() * 20) + 10;
                if ((num1 % 10) + (num2 % 10) >= 10 && (num1 + num2) < 100) return [num1, num2];
            }
        }

        function generarNumerosRestaLlevando() {
            while(true) {
                let num1 = Math.floor(Math.random() * 80) + 20;
                let num2 = Math.floor(Math.random() * (num1 - 5)) + 5;
                if ((num1 % 10) < (num2 % 10)) return [num1, num2];
            }
        }

        function generarNumerosMultiplicar() {
            return [Math.floor(Math.random() * 9) + 2, Math.floor(Math.random() * 8) + 2];
        }

        /* Función auxiliar para crear la estructura de una página A4 limpia */
        function crearNuevaPaginaA4(numeroPagina, totalPaginas) {
            const page = document.createElement('div');
            page.className = 'a4-page';

            // 1. Imagen de Cabecera (Solo si se ha subido)
            const img = document.createElement('img');
            img.className = 'ficha-header-image';
            if (base64Image) {
                img.src = base64Image;
                img.style.display = "block";
            }
            page.appendChild(img);

            // 2. Datos de Alumno
            const fields = document.createElement('div');
            fields.className = 'ficha-header-fields';
            fields.innerHTML = `<div>Nombre: ___________________________________</div><div>Fecha: ___________</div>`;
            page.appendChild(fields);

            // 3. Contenedor de Problemas
            const list = document.createElement('div');
            list.className = 'problems-list';
            page.appendChild(list);

            // 4. Pie de página de Autoría Requerido
            const footer = document.createElement('div');
            footer.className = 'ficha-footer';
            footer.innerHTML = `<div>ESR | Colegio Alborada | Red Arenales</div><div>Pág. ${numeroPagina} de ${totalPaginas}</div>`;
            page.appendChild(footer);

            return { elementoPagina: page, contenedorProblemas: list };
        }

        /* MOTOR PRINCIPAL: Paginación estricta controlada por código */
        function generarFicha() {
            const opType = document.getElementById('opType').value;
            const countInput = document.getElementById('probCount');
            let totalSolicitado = parseInt(countInput.value);

            if (isNaN(totalSolicitado) || totalSolicitado < 1) totalSolicitado = 1;
            if (totalSolicitado > 50) totalSolicitado = 50;
            countInput.value = totalSolicitado;

            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = ""; // Reseteamos la vista previa por completo

            // Pedagogía: Sabiendo los tamaños establecidos, caben de forma óptima 4 problemas por folio A4.
            const problemasPorPagina = 4;
            const totalPaginasNecesarias = Math.ceil(totalSolicitado / problemasPorPagina);

            let enunciadosCreados = new Set();
            let intentosMaximos = 2000; 
            let generados = 0;

            // Creamos las páginas de antemano y guardamos sus referencias
            let paginasFisicas = [];
            for (let i = 1; i <= totalPaginasNecesarias; i++) {
                let s = crearNuevaPaginaA4(i, totalPaginasNecesarias);
                previewContainer.appendChild(s.elementoPagina);
                paginasFisicas.push(s.contenedorProblemas);
            }

            // Repartimos los problemas secuencialmente entre las hojas físicas reales
            while (generados < totalSolicitado && intentosMaximos > 0) {
                intentosMaximos--;

                let tipoActual = "";
                if (opType === "suma_sin") tipoActual = "suma_sin";
                else if (opType === "resta_sin") tipoActual = "resta_sin";
                else if (opType === "suma_resta_sin") tipoActual = Math.random() > 0.5 ? "suma_sin" : "resta_sin";
                else if (opType === "suma_llev_resta_sin") tipoActual = Math.random() > 0.5 ? "suma_llev" : "resta_sin";
                else if (opType === "suma_resta_llev") tipoActual = Math.random() > 0.5 ? "suma_llev" : "resta_llev";
                else if (opType === "multiplicar") tipoActual = "multiplicar";
                else if (opType === "mix_todo") {
                    let r = Math.random();
                    if (r < 0.34) tipoActual = "suma_llev";
                    else if (r < 0.67) tipoActual = "resta_llev";
                    else tipoActual = "multiplicar";
                }

                let numeros = [0, 0];
                let macroTipo = "suma"; 
                
                if (tipoActual === "suma_sin") { numeros = generarNumerosSumaSinLlevar(); macroTipo = "suma"; }
                else if (tipoActual === "suma_llev") { numeros = generarNumerosSumaLleando(); macroTipo = "suma"; }
                else if (tipoActual === "resta_sin") { numeros = generarNumerosRestaSinLlevar(); macroTipo = "resta"; }
                else if (tipoActual === "resta_llev") { numeros = generarNumerosRestaLlevando(); macroTipo = "resta"; }
                else if (tipoActual === "multiplicar") { numeros = generarNumerosMultiplicar(); macroTipo = "multiplicar"; }

                let n = nombres[Math.floor(Math.random() * nombres.length)];
                let o = objetos[Math.floor(Math.random() * objetos.length)];
                let l = lugares[Math.floor(Math.random() * lugares.length)];
                let c = contextos[Math.floor(Math.random() * contextos.length)]; // Línea corregida

                let arrayPlantillas = plantillas[macroTipo];
                let plantillaBase = arrayPlantillas[Math.floor(Math.random() * arrayPlantillas.length)];

                let enunciado = plantillaBase;
                enunciado = enunciado.replace(/\[Nombre\]/g, n);
                enunciado = enunciado.replace(/\[objeto\]/g, o.nombre);
                enunciado = enunciado.replace(/\[lugar\]/g, l);
                enunciado = enunciado.replace(/\[contexto\]/g, c);
                enunciado = enunciado.replace(/\[A\]/g, numeros[0]);
                enunciado = enunciado.replace(/\[B\]/g, numeros[1]);

                let pronombreCantidad = (o.genero === "m") ? "Cuántos" : "Cuántas";
                enunciado = enunciado.replace(/\[Cuantos\]/g, pronombreCantidad);
                enunciado = enunciado.replace(/\[cuantos\]/g, pronombreCantidad.toLowerCase());

                if (!enunciadosCreados.has(enunciado)) {
                    enunciadosCreados.add(enunciado);
                    generados++;

                    // Estructuración del bloque
                    const block = document.createElement('div');
                    block.className = 'problem-block';

                    const pText = document.createElement('p');
                    pText.className = 'problem-text';
                    pText.innerHTML = `<strong>${generados}.</strong> ${enunciado}`;

                    const rBox = document.createElement('div');
                    rBox.className = 'response-box';

                    block.appendChild(pText);
                    block.appendChild(rBox);

                    // Distribución matemática: Elige a qué hoja enviarlo para que queden balanceados
                    let indicePaginaDestino = Math.floor((generados - 1) / problemasPorPagina);
                    paginasFisicas[indicePaginaDestino].appendChild(block);
                }
            }
        }

        function descargarPDF() {
            window.print();
        }

        document.getElementById('btnGenerate').addEventListener('click', generarFicha);
        document.getElementById('btnDownload').addEventListener('click', descargarPDF);

        // Renderizado inicial al iniciar
        generarFicha();
    </script>
</body>
</html>
